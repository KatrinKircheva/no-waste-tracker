<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>No Waste Tracker - Рецепти</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        body {
            scroll-behavior: smooth;
        }

        .header h1 {
            padding-left: 4.5rem;
            vertical-align: middle;
            font-size: 1.5rem;
            color: rgba(25, 170, 14, 0.9);
            font-family: serif;
            text-decoration: none;
            border: none;
        }

        /* Add a black background color to the top navigation */
        .header {
            display: flex;
            justify-content: space-between;
            background-color: white;
            overflow: hidden;
            align-items: center;
            padding: 0.6rem;
            border-bottom: 1px grey solid;
            padding-right: 3rem;
        }

        /* Style the links inside the navigation bar */
        .nav a {
            gap: 3rem;
            color: rgb(107, 180, 107);
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            font-size: 17px;
            float: none;
            /* remove existing float */
            display: inline-block;
        }

        /* Change the color of links on hover */
        .nav a:hover {
            background-color: rgb(156, 211, 156);
            color: black;
            border-radius: 6rem;
            font-size: larger;
            color: black;
            font-family: serif;
        }

        .nav {
            gap: 1rem;
            display: flex;
            justify-content: center;
            border-radius: 6rem;
            padding-right: 1rem;
        }

        #title {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding-right: 1rem;
        }

        button {
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            color: white;
            background-color: rgb(132, 199, 132);
            border: none;
            display: flex;
            padding: 1rem 1.5rem;
            justify-content: flex-end;
            border-radius: 2rem;
        }

        button:hover {
            color: white;
            border: none;
            background-color: rgb(107, 180, 107);
        }

        /* ===== ACTIVE MENU ===== */
        .nav a.active {
            background-color: rgb(156, 211, 156);
            border-radius: 6rem;
            color: black;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                padding: 1rem;
            }

            .header h1 {
                padding-left: 0;
                margin-bottom: 1rem;
            }

            .nav {
                padding-right: 0;
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        /* Recipes specific styles */
        .recipes-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .recipes-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .recipes-header h1 {
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .recipes-header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .available-ingredients {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .available-ingredients h2 {
            color: var(--primary-color);
            margin-bottom: 1.5rem;
        }

        .ingredients-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .ingredient-tag {
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            border: 1px solid var(--border-color);
        }

        .ingredient-tag.use-soon {
            background: rgba(243, 156, 18, 0.2);
            border-color: var(--use-soon-color);
            color: var(--use-soon-color);
        }

        .recipes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .recipe-card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .recipe-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
        }

        .recipe-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            padding: 1.5rem;
            color: white;
        }

        .recipe-title {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .recipe-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .recipe-meta span {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .recipe-body {
            padding: 1.5rem;
        }

        .recipe-ingredients {
            margin-bottom: 1.5rem;
        }

        .recipe-ingredients h4 {
            color: var(--text-primary);
            margin-bottom: 0.75rem;
        }

        .ingredient-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .ingredient-item {
            background: var(--bg-secondary);
            padding: 0.25rem 0.75rem;
            border-radius: 15px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .ingredient-item.available {
            background: rgba(46, 204, 113, 0.2);
            color: var(--safe-color);
            border: 1px solid var(--safe-color);
        }

        .ingredient-item.missing {
            background: rgba(231, 76, 60, 0.2);
            color: var(--expired-color);
            border: 1px solid var(--expired-color);
        }

        .recipe-instructions {
            margin-top: 1.5rem;
        }

        .recipe-instructions h4 {
            color: var(--text-primary);
            margin-bottom: 0.75rem;
        }

        .recipe-instructions p {
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .recipe-actions {
            padding: 1rem 1.5rem;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
        }

        .match-percentage {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.75rem;
        }

        .match-bar {
            height: 8px;
            background: var(--bg-primary);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 0.75rem;
        }

        .match-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--expired-color), var(--use-soon-color), var(--safe-color));
            transition: width 0.5s ease;
        }

        .cook-btn {
            width: 100%;
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .cook-btn:hover {
            background: var(--secondary-color);
            transform: translateY(-1px);
        }

        .no-recipes {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .no-recipes-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .filter-section {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .filter-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        @media (max-width: 768px) {
            .recipes-container {
                padding: 1rem;
            }

            .recipes-grid {
                grid-template-columns: 1fr;
            }

            .recipe-meta {
                flex-direction: column;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1 id="title">No-waste tracker</h1>

        <nav class="nav">
            <a href="index.html" id="homeLink">Home</a>
            <a href="dashboard.html" id="myProductsLink">My products</a>
            <a href="recipes.html" id="recipesLink" class="active">Recipes</a>
            <a href="stats.html" id="statisticsLink">Statistics</a>
            <a href="#recycling" id="recyclingLink">Recycling</a>
        </nav>

        <button type="button" id="addProductBtn">+ Add Product</button>
    </header>

    <main class="recipes-container">
        <div class="recipes-header">
            <h1>🍳 Рецепти с вашите продукти</h1>
            <p>Открийте какво можете да сготвите с това, което имате у дома</p>
        </div>

        <!-- Available Ingredients Section -->
        <section class="available-ingredients">
            <h2>🥘 Налични продукти</h2>
            <div id="availableIngredients" class="ingredients-grid">
                <!-- Ingredients will be added here dynamically -->
            </div>
            <p id="ingredientsCount" style="color: var(--text-secondary); font-size: 0.9rem;">
                Зареждане на продукти...
            </p>
        </section>

        <!-- Filter Section -->
        <section class="filter-section">
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">Всички рецепти</button>
                <button class="filter-btn" data-filter="easy">Лесни</button>
                <button class="filter-btn" data-filter="medium">Средни</button>
                <button class="filter-btn" data-filter="hard">Трудни</button>
            </div>
        </section>

        <!-- Recipes Grid -->
        <section id="recipesGrid" class="recipes-grid">
            <!-- Recipes will be added here dynamically -->
        </section>

        <!-- No Recipes State -->
        <div id="noRecipes" class="no-recipes" style="display: none;">
            <div class="no-recipes-icon">🍽️</div>
            <h3>Няма подходящи рецепти</h3>
            <p>Добавете повече продукти, за да видим какво можем да сготвим!</p>
        </div>
    </main>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/products.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/helpers.js"></script>
    <script src="js/recipes.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>No Waste Tracker - Рецепти</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <header class="header">
        <h1 id="title">No-waste tracker</h1>

        <nav class="nav">
            <a href="index.html" id="homeLink">Home</a>
            <a href="recipes.html" id="recipesLink" class="active">Recipes</a>
            <a href="stats.html" id="statisticsLink">Statistics</a>
        </nav>

        <button type="button" id="addProductBtn">+ Add Product</button>
    </header>

    <main class="recipes-container">
        <div class="recipes-header">
            <h1>🍳 Рецепти с вашите продукти</h1>
            <p>Открийте какво можете да сготвите с това, което имате у дома</p>
        </div>

        <!-- Available Ingredients Section -->
        <section class="available-ingredients">
            <h2>🥘 Налични продукти</h2>
            <div id="availableIngredients" class="ingredients-grid">
                <!-- Ingredients will be added here dynamically -->
            </div>
            <p id="ingredientsCount" style="color: var(--text-secondary); font-size: 0.9rem;">
                Зареждане на продукти...
            </p>
        </section>

        <!-- Filter Section -->
        <section class="filter-section">
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">Всички рецепти</button>
                <button class="filter-btn" data-filter="easy">Лесни</button>
                <button class="filter-btn" data-filter="medium">Средни</button>
                <button class="filter-btn" data-filter="hard">Трудни</button>
            </div>
        </section>

        <!-- Recipes Grid -->
        <section id="recipesGrid" class="recipes-grid">
            <!-- Recipes will be added here dynamically -->
        </section>

        <!-- No Recipes State -->
        <div id="noRecipes" class="no-recipes" style="display: none;">
            <div class="no-recipes-icon">🍽️</div>
            <h3>Няма подходящи рецепти</h3>
            <p>Добавете повече продукти, за да видим какво можем да сготвим!</p>
        </div>
    </main>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/products.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/helpers.js"></script>
    <script src="js/recipes.js"></script>
</body>
</html>

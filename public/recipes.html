<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>No Waste Tracker - Рецепти</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <header class="header">
        <div class="logo-container">
            <img class=logo" src="logo.jpg" alt="logo" height="50px">
            <h1 id="title">No-waste tracker</h1>
        </div>
        <nav class="nav">
            <a href="index.html" id="homeLink">Home</a>
            <a href="recipes.html" id="recipesLink" class="active">Recipes</a>
            <a href="stats.html" id="statisticsLink">Statistics</a>
        </nav>

        <button type="button" id="addProductBtn">+ Add Product</button>
    </header>

    <!-- MODAL FOR ADDING PRODUCT -->
    <div id="addProductModal" class="modal hidden">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Добави продукт</h2>
            <form id="addProductForm">
                <label for="productName">Име на продукта:</label>
                <input type="text" id="productName" name="name" required>

                <label for="productCategory">Категория:</label>
                <select id="productCategory" name="category" required>
                    <option value="">Избери категория</option>
                    <option value="млечни">Млечни</option>
                    <option value="зеленчуци">Зеленчуци</option>
                    <option value="плодове">Плодове</option>
                    <option value="месо">Месо</option>
                    <option value="хляб">Хляб</option>
                    <option value="консерви">Консерви</option>
                    <option value="замразени">Замразени</option>
                    <option value="напитки">Напитки</option>
                    <option value="други">Други</option>
                </select>

                <label for="productQuantity">Количество:</label>
                <input type="number" id="productQuantity" name="quantity" min="0.1" step="0.1" required>

                <label for="productUnit">Мерна единица:</label>
                <select id="productUnit" name="unit" required>
                    <option value="бр">бр</option>
                    <option value="кг">кг</option>
                    <option value="л">л</option>
                    <option value="г">г</option>
                </select>

                <label for="expiryDate">Дата на изтичане:</label>
                <input type="date" id="expiryDate" name="expiryDate" required>

                <label for="productNotes">Бележки:</label>
                <textarea id="productNotes" name="notes"></textarea>

                <button type="submit">Добави продукт</button>
            </form>

            <h3>Бързо добавяне:</h3>
            <div class="quick-add-buttons">
                <button class="quick-add-btn" data-name="Мляко" data-category="млечни" data-unit="л">Мляко</button>
                <button class="quick-add-btn" data-name="Хляб" data-category="хляб" data-unit="бр">Хляб</button>
                <button class="quick-add-btn" data-name="Яйца" data-category="млечни" data-unit="бр">Яйца</button>
                <button class="quick-add-btn" data-name="Картофи" data-category="зеленчуци" data-unit="кг">Картофи</button>
            </div>
        </div>
    </div>

    <main class="recipes-container">
        <div class="recipes-header">
            <h1> Рецепти с вашите продукти</h1>
            <p>Открийте какво можете да сготвите с това, което имате у дома</p>
        </div>

        <!-- Available Ingredients Section -->
        <section class="available-ingredients">
            <h2> Налични продукти</h2>
            <div id="availableIngredients" class="ingredients-grid">
                <!-- Ingredients will be added here dynamically -->
            </div>
            <p id="ingredientsCount" style="color: var(--text-secondary); font-size: 0.9rem;">
                Зареждане на продукти...
            </p>
        </section>

        <!-- Filter Section -->
        <section class="filter-section">
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">Всички рецепти</button>
                <button class="filter-btn" data-filter="easy">Лесни</button>
                <button class="filter-btn" data-filter="medium">Средни</button>
                <button class="filter-btn" data-filter="hard">Трудни</button>
            </div>
        </section>

        <!-- Recipes Grid -->
        <section id="recipesGrid" class="recipes-grid">
            <!-- Recipes will be added here dynamically -->
        </section>

        <!-- No Recipes State -->
        <div id="noRecipes" class="no-recipes" style="display: none;">
            <h3>Няма подходящи рецепти</h3>
            <p>Добавете повече продукти, за да видим какво можем да сготвим!</p>
        </div>
    </main>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/products.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/helpers.js"></script>
    <script src="js/recipes.js"></script>
    <script src="js/add-product.js"></script>
    <script>
        // Modal functionality
        document.addEventListener("DOMContentLoaded", function () {
            const addProductBtn = document.getElementById("addProductBtn");
            const modal = document.getElementById("addProductModal");
            const closeBtn = document.querySelector(".close");

            if (addProductBtn && modal) {
                addProductBtn.addEventListener("click", function () {
                    modal.classList.remove("hidden");
                });

                closeBtn.addEventListener("click", function () {
                    modal.classList.add("hidden");
                });

                // Close modal when clicking outside
                window.addEventListener("click", function (event) {
                    if (event.target === modal) {
                        modal.classList.add("hidden");
                    }
                });
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>No Waste Tracker - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        body {
            scroll-behavior: smooth;
        }

        .header h1 {
            padding-left: 4.5rem;
            vertical-align: middle;
            font-size: 1.5rem;
            color: rgba(25, 170, 14, 0.9);
            font-family: serif;
            text-decoration: none;
            border: none;
        }

        /* Add a black background color to the top navigation */
        .header {
            display: flex;
            justify-content: space-between;
            background-color: white;
            overflow: hidden;
            align-items: center;
            padding: 0.6rem;
            border-bottom: 1px grey solid;
            padding-right: 3rem;
        }

        /* Style the links inside the navigation bar */
        .nav a {
            gap: 3rem;
            color: rgb(107, 180, 107);
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            font-size: 17px;
            float: none;
            /* remove existing float */
            display: inline-block;
        }

        /* Change the color of links on hover */
        .nav a:hover {
            background-color: rgb(156, 211, 156);
            color: black;
            border-radius: 6rem;
            font-size: larger;
            color: black;
            font-family: serif;
        }

        .nav {
            gap: 1rem;
            display: flex;
            justify-content: center;
            border-radius: 6rem;
            padding-right: 1rem;
        }

        #title {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding-right: 1rem;
        }

        button {
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            color: white;
            background-color: rgb(132, 199, 132);
            border: none;
            display: flex;
            padding: 1rem 1.5rem;
            justify-content: flex-end;
            border-radius: 2rem;
        }

        button:hover {
            color: white;
            border: none;
            background-color: rgb(107, 180, 107);
        }

        /* ===== ACTIVE MENU ===== */
        .nav a.active {
            background-color: rgb(156, 211, 156);
            border-radius: 6rem;
            color: black;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                padding: 1rem;
            }

            .header h1 {
                padding-left: 0;
                margin-bottom: 1rem;
            }

            .nav {
                padding-right: 0;
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1 id="title">No-waste tracker</h1>

        <nav class="nav">
            <a href="index.html" id="homeLink">Home</a>
            <a href="dashboard.html" id="myProductsLink" class="active">My products</a>
            <a href="recipes.html" id="recipesLink">Recipes</a>
            <a href="stats.html" id="statisticsLink">Statistics</a>
            <a href="#recycling" id="recyclingLink">Recycling</a>
        </nav>

        <button type="button" id="addProductBtn">+ Add Product</button>
    </header>

    <main class="dashboard-container">
        <!-- Summary Cards -->
        <section class="summary-cards">
            <div class="card total-products">
                <div class="card-icon">📦</div>
                <div class="card-content">
                    <h3>Общо продукти</h3>
                    <span id="totalProducts" class="card-number">0</span>
                </div>
            </div>
            
            <div class="card expiring-soon">
                <div class="card-icon">⏰</div>
                <div class="card-content">
                    <h3>Изтичат скоро</h3>
                    <span id="expiringSoon" class="card-number">0</span>
                </div>
            </div>
            
            <div class="card used">
                <div class="card-icon">✅</div>
                <div class="card-content">
                    <h3>Използвани</h3>
                    <span id="usedProducts" class="card-number">0</span>
                </div>
            </div>
            
            <div class="card eco-score">
                <div class="card-icon">🌍</div>
                <div class="card-content">
                    <h3>Eco Score</h3>
                    <span id="ecoScore" class="card-number">50</span>
                </div>
            </div>
        </section>

        <!-- Use Today Section -->
        <section class="use-today-section">
            <h2>🔥 Използвай днес</h2>
            <div id="useTodayProducts" class="products-grid">
                <!-- Products will be added here dynamically -->
            </div>
        </section>

        <!-- Main Products List -->
        <section class="products-section">
            <div class="section-header">
                <h2>📋 Всички продукти</h2>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">Всички</button>
                    <button class="filter-btn" data-filter="safe">Безопасни</button>
                    <button class="filter-btn" data-filter="use-soon">Изтичат</button>
                    <button class="filter-btn" data-filter="expired">Изтекли</button>
                </div>
            </div>
            <div id="productsList" class="products-grid">
                <!-- Products will be added here dynamically -->
            </div>
        </section>

        <!-- Quick Tips -->
        <section class="tips-section">
            <h2>💡 Съвети за деня</h2>
            <div id="quickTips" class="tips-grid">
                <!-- Tips will be added here dynamically -->
            </div>
        </section>
    </main>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/helpers.js"></script>
    <script src="js/products.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/stats.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>No Waste Tracker - Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-brand">
                <span class="logo">🌱 No Waste Tracker</span>
            </div>
            <div class="nav-links">
                <a href="dashboard.html" class="active">Dashboard</a>
                <a href="add-product.html">Добави продукт</a>
                <a href="stats.html">Статистика</a>
                <a href="recipes.html">Рецепти</a>
            </div>
        </nav>
    </header>

    <main class="dashboard-container">
        <!-- Summary Cards -->
        <section class="summary-cards">
            <div class="card total-products">
                <div class="card-icon">📦</div>
                <div class="card-content">
                    <h3>Общо продукти</h3>
                    <span id="totalProducts" class="card-number">0</span>
                </div>
            </div>
            
            <div class="card expiring-soon">
                <div class="card-icon">⏰</div>
                <div class="card-content">
                    <h3>Изтичат скоро</h3>
                    <span id="expiringSoon" class="card-number">0</span>
                </div>
            </div>
            
            <div class="card used">
                <div class="card-icon">✅</div>
                <div class="card-content">
                    <h3>Използвани</h3>
                    <span id="usedProducts" class="card-number">0</span>
                </div>
            </div>
            
            <div class="card eco-score">
                <div class="card-icon">🌍</div>
                <div class="card-content">
                    <h3>Eco Score</h3>
                    <span id="ecoScore" class="card-number">50</span>
                </div>
            </div>
        </section>

        <!-- Use Today Section -->
        <section class="use-today-section">
            <h2>🔥 Използвай днес</h2>
            <div id="useTodayProducts" class="products-grid">
                <!-- Products will be added here dynamically -->
            </div>
        </section>

        <!-- Main Products List -->
        <section class="products-section">
            <div class="section-header">
                <h2>📋 Всички продукти</h2>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">Всички</button>
                    <button class="filter-btn" data-filter="safe">Безопасни</button>
                    <button class="filter-btn" data-filter="use-soon">Изтичат</button>
                    <button class="filter-btn" data-filter="expired">Изтекли</button>
                </div>
            </div>
            <div id="productsList" class="products-grid">
                <!-- Products will be added here dynamically -->
            </div>
        </section>

        <!-- Quick Tips -->
        <section class="tips-section">
            <h2>💡 Съвети за деня</h2>
            <div id="quickTips" class="tips-grid">
                <!-- Tips will be added here dynamically -->
            </div>
        </section>
    </main>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/helpers.js"></script>
    <script src="js/products.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/stats.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>

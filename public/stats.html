<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>No Waste Tracker - Статистика</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <style>
        /* Stats specific styles */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .stat-card h3 {
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            font-size: 1.3rem;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-value {
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--text-primary);
        }

        .progress-bar {
            height: 20px;
            background: var(--bg-secondary);
            border-radius: 10px;
            overflow: hidden;
            margin: 1rem 0;
            display: flex;
        }

        .progress-segment {
            height: 100%;
            transition: width 0.5s ease;
        }

        .progress-segment.used {
            background: var(--safe-color);
        }

        .progress-segment.active {
            background: var(--primary-color);
        }

        .progress-segment.thrown {
            background: var(--expired-color);
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }

        .eco-score-display {
            text-align: center;
            padding: 2rem 0;
        }

        .eco-score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: conic-gradient(
                var(--safe-color) 0deg calc(var(--eco-score) * 3.6deg),
                var(--bg-secondary) calc(var(--eco-score) * 3.6deg) 360deg
            );
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            position: relative;
        }

        .eco-score-circle::before {
            content: '';
            position: absolute;
            width: 120px;
            height: 120px;
            background: var(--bg-card);
            border-radius: 50%;
        }

        .eco-score-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--text-primary);
            position: relative;
            z-index: 1;
        }

        .eco-score-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            position: relative;
            z-index: 1;
        }

        .eco-message {
            font-size: 1.1rem;
            color: var(--text-primary);
            margin-top: 1rem;
            font-weight: 600;
        }

        .chart-container {
            margin-top: 2rem;
            background: var(--bg-card);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
        }

        .chart-title {
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            font-size: 1.3rem;
        }

        #wasteChart {
            max-width: 100%;
            height: 300px;
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-brand">
                <span class="logo">🌱 No Waste Tracker</span>
            </div>
            <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="add-product.html">Добави продукт</a>
                <a href="stats.html" class="active">Статистика</a>
                <a href="recipes.html">Рецепти</a>
            </div>
        </nav>
    </header>

    <main class="dashboard-container">
        <h1 class="text-center mb-2">📊 Вашата статистика</h1>
        <p class="text-center mb-2" style="color: var(--text-secondary);">
            Проследете напредъка си в намаляването на хранителните отпадъци
        </p>

        <!-- Summary Cards -->
        <section class="summary-cards">
            <div class="card total-products">
                <div class="card-icon">📦</div>
                <div class="card-content">
                    <h3>Общо продукти</h3>
                    <span id="totalProducts" class="card-number">0</span>
                </div>
            </div>
            
            <div class="card expiring-soon">
                <div class="card-icon">⏰</div>
                <div class="card-content">
                    <h3>Изтичат скоро</h3>
                    <span id="expiringSoon" class="card-number">0</span>
                </div>
            </div>
            
            <div class="card used">
                <div class="card-icon">✅</div>
                <div class="card-content">
                    <h3>Използвани</h3>
                    <span id="usedProducts" class="card-number">0</span>
                </div>
            </div>
            
            <div class="card eco-score">
                <div class="card-icon">🌍</div>
                <div class="card-content">
                    <h3>Eco Score</h3>
                    <span id="ecoScore" class="card-number">50</span>
                </div>
            </div>
        </section>

        <!-- Detailed Statistics -->
        <div id="detailedStats">
            <!-- Stats will be rendered here by JavaScript -->
        </div>

        <!-- Chart Section -->
        <div class="chart-container">
            <h2 class="chart-title">📈 Графика на отпадъците</h2>
            <canvas id="wasteChart"></canvas>
        </div>

        <!-- Tips Section -->
        <section class="tips-section">
            <h2>💡 Как да подобрите Eco Score</h2>
            <div id="improvementTips" class="tips-grid">
                <!-- Tips will be rendered here -->
            </div>
        </section>
    </main>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/helpers.js"></script>
    <script src="js/products.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/stats.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>No Waste Tracker - Статистика</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <header class="header">
        <div class="logo-container">
            <img class=logo" src="logo.jpg" alt="logo" height="50px">
            <h1 id="title">No-waste tracker</h1>
        </div>
        <nav class="nav">
            <a href="index.html" id="homeLink">Home</a>
            <a href="recipes.html" id="recipesLink">Recipes</a>
            <a href="stats.html" id="statisticsLink" class="active">Statistics</a>
        </nav>

        <button type="button" id="addProductBtn">+ Add Product</button>
    </header>

    <!-- MODAL FOR ADDING PRODUCT -->
    <div id="addProductModal" class="modal hidden">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Добави продукт</h2>
            <form id="addProductForm">
                <label for="productName">Име на продукта:</label>
                <input type="text" id="productName" name="name" required>

                <label for="productCategory">Категория:</label>
                <select id="productCategory" name="category" required>
                    <option value="">Избери категория</option>
                    <option value="млечни">Млечни</option>
                    <option value="зеленчуци">Зеленчуци</option>
                    <option value="плодове">Плодове</option>
                    <option value="месо">Месо</option>
                    <option value="хляб">Хляб</option>
                    <option value="консерви">Консерви</option>
                    <option value="замразени">Замразени</option>
                    <option value="напитки">Напитки</option>
                    <option value="други">Други</option>
                </select>

                <label for="productQuantity">Количество:</label>
                <input type="number" id="productQuantity" name="quantity" min="0.1" step="0.1" required>

                <label for="productUnit">Мерна единица:</label>
                <select id="productUnit" name="unit" required>
                    <option value="бр">бр</option>
                    <option value="кг">кг</option>
                    <option value="л">л</option>
                    <option value="г">г</option>
                </select>

                <label for="expiryDate">Дата на изтичане:</label>
                <input type="date" id="expiryDate" name="expiryDate" required>

                <label for="productNotes">Бележки:</label>
                <textarea id="productNotes" name="notes"></textarea>

                <button type="submit">Добави продукт</button>
            </form>

            <h3>Бързо добавяне:</h3>
            <div class="quick-add-buttons">
                <button class="quick-add-btn" data-name="Мляко" data-category="млечни" data-unit="л">Мляко</button>
                <button class="quick-add-btn" data-name="Хляб" data-category="хляб" data-unit="бр">Хляб</button>
                <button class="quick-add-btn" data-name="Яйца" data-category="млечни" data-unit="бр">Яйца</button>
                <button class="quick-add-btn" data-name="Картофи" data-category="зеленчуци" data-unit="кг">Картофи</button>
            </div>
        </div>
    </div>

    <main class="dashboard-container">
        <h1 class="text-center mb-2"> Вашата статистика</h1>
        <p class="text-center mb-2" style="color: var(--text-secondary);">
            Проследете напредъка си в намаляването на хранителните отпадъци
        </p>

        <!-- Summary Cards -->
        <section class="summary-cards">
            <div class="card total-products">
                <div class="card-content">
                    <h3>Общо продукти</h3>
                    <span id="totalProducts" class="card-number">0</span>
                </div>
            </div>
            
            <div class="card expiring-soon">
                <div class="card-content">
                    <h3>Изтичат скоро</h3>
                    <span id="expiringSoon" class="card-number">0</span>
                </div>
            </div>
            
            <div class="card used">
                <div class="card-content">
                    <h3>Използвани</h3>
                    <span id="usedProducts" class="card-number">0</span>
                </div>
            </div>
            
            <div class="card eco-score">
                <div class="card-content">
                    <h3>Eco Score</h3>
                    <span id="ecoScore" class="card-number">50</span>
                </div>
            </div>
        </section>

        <!-- Detailed Statistics -->
        <div id="detailedStats">
            <!-- Stats will be rendered here by JavaScript -->
        </div>

        <!-- Tips Section -->
        <section class="tips-section">
            <h2> Как да подобрите Eco Score</h2>
            <div id="improvementTips" class="tips-grid">
                <!-- Tips will be rendered here -->
            </div>
        </section>
    </main>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/helpers.js"></script>
    <script src="js/products.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/stats.js"></script>
    <script src="js/add-product.js"></script>
    <script>
        // Modal functionality
        document.addEventListener("DOMContentLoaded", function () {
            const addProductBtn = document.getElementById("addProductBtn");
            const modal = document.getElementById("addProductModal");
            const closeBtn = document.querySelector(".close");

            if (addProductBtn && modal) {
                addProductBtn.addEventListener("click", function () {
                    modal.classList.remove("hidden");
                });

                closeBtn.addEventListener("click", function () {
                    modal.classList.add("hidden");
                });

                // Close modal when clicking outside
                window.addEventListener("click", function (event) {
                    if (event.target === modal) {
                        modal.classList.add("hidden");
                    }
                });
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>No Waste Tracker - Намалете хранителните отпадъци</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

    <header class="header">
        <div class="logo-container">
            <img class=logo" src="logo.jpg" alt="logo" height="50px">
            <h1 id="title">No-waste tracker</h1>
        </div>
        <nav class="nav">
            <a href="index.html" id="homeLink" class="active">Home</a>
            <a href="recipes.html" id="recipesLink">Recipes</a>
            <a href="stats.html" id="statisticsLink">Statistics</a>
        </nav>

        <button type="button" id="addProductBtn">+ Add Product</button>
    </header>

    <!-- MODAL FOR ADDING PRODUCT -->
    <div id="addProductModal" class="modal hidden">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Добави продукт</h2>
            <form id="addProductForm">
                <label for="productName">Име на продукта:</label>
                <input type="text" id="productName" name="name" required>

                <label for="productCategory">Категория:</label>
                <select id="productCategory" name="category" required>
                    <option value="">Избери категория</option>
                    <option value="млечни">Млечни</option>
                    <option value="зеленчуци">Зеленчуци</option>
                    <option value="плодове">Плодове</option>
                    <option value="месо">Месо</option>
                    <option value="хляб">Хляб</option>
                    <option value="консерви">Консерви</option>
                    <option value="замразени">Замразени</option>
                    <option value="напитки">Напитки</option>
                    <option value="други">Други</option>
                </select>

                <label for="productQuantity">Количество:</label>
                <input type="number" id="productQuantity" name="quantity" min="0.1" step="0.1" required>

                <label for="productUnit">Мерна единица:</label>
                <select id="productUnit" name="unit" required>
                    <option value="бр">бр</option>
                    <option value="кг">кг</option>
                    <option value="л">л</option>
                    <option value="г">г</option>
                </select>

                <label for="expiryDate">Дата на изтичане:</label>
                <input type="date" id="expiryDate" name="expiryDate" required>

                <label for="productNotes">Бележки:</label>
                <textarea id="productNotes" name="notes"></textarea>

                <button type="submit">Добави продукт</button>
            </form>

            <h3>Бързо добавяне:</h3>
            <div class="quick-add-buttons">
                <button class="quick-add-btn" data-name="Мляко" data-category="млечни" data-unit="л">Мляко</button>
                <button class="quick-add-btn" data-name="Хляб" data-category="хляб" data-unit="бр">Хляб</button>
                <button class="quick-add-btn" data-name="Яйца" data-category="млечни" data-unit="бр">Яйца</button>
                <button class="quick-add-btn" data-name="Картофи" data-category="зеленчуци" data-unit="кг">Картофи</button>
            </div>
        </div>
    </div>

    <!-- BANNER -->
    <section class="banner">
        <h2>Small Habits,<br> Big Impact.</h2>
        <p>Buy with thought, eat with care.</p>
        <img src="banner_3.jpg" alt="food banner">
    </section>

    <main class="dashboard-container">
        <h3 class="expiring-title">Expiring soon:</h3>

        <!-- EXPIRING -->
        <section class="expiring">
            <div class="expiring-item days-two">
                <div class="card-content">
                    <span class="paragraph">Общо продукти</span>
                    <span id="expiringTotalProducts" class="numbers">0</span>
                </div>
            </div>

            <div class="expiring-item days-five">
                <div class="card-content">
                    <span class="paragraph">Изтичат скоро</span>
                    <span id="expiringExpiringSoon" class="numbers">0</span>
                </div>
            </div>

            <div class="expiring-item still">
                <div class="card-content">
                    <span class="paragraph">Използвани</span>
                    <span id="expiringUsedProducts" class="numbers">0</span>
                </div>
            </div>
        </section>

        <!-- FEATURES -->

            <!-- Use Today Section -->
            <section class="use-today-section">
                <h2> Използвай днес</h2>
                <div id="useTodayProducts" class="products-grid">
                    <!-- Products will be added here dynamically -->
                </div>
            </section>

            <!-- Main Products List -->
            <section class="products-section">
                <div class="section-header">
                    <h2> Всички продукти</h2>
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="all">Всички</button>
                        <button class="filter-btn" data-filter="safe">Безопасни</button>
                        <button class="filter-btn" data-filter="use-soon">Изтичат</button>
                        <button class="filter-btn" data-filter="expired">Изтекли</button>
                    </div>
                </div>
                <div id="productsList" class="products-grid">
                    <!-- Products will be added here dynamically -->
                </div>
            </section>

            <!-- Quick Tips -->
            <section class="tips-section">
                <h2>💡 Съвети за деня</h2>
                <div id="quickTips" class="tips-grid">
                    <!-- Tips will be added here dynamically -->
                </div>
            </section>
    </main>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/helpers.js"></script>
    <script src="js/products.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/stats.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/add-product.js"></script>
    <script src="js/app.js"></script>
<!--    <script src="../script.js"></script>-->
    <script>
        // Modal functionality - ensure it works even if script.js doesn't load properly
        document.addEventListener("DOMContentLoaded", function () {
            const addProductBtn = document.getElementById("addProductBtn");
            const modal = document.getElementById("addProductModal");
            const closeBtn = document.querySelector(".close");

            if (addProductBtn && modal) {
                addProductBtn.addEventListener("click", function () {
                    modal.classList.remove("hidden");
                });

                closeBtn.addEventListener("click", function () {
                    modal.classList.add("hidden");
                });

                // Close modal when clicking outside
                window.addEventListener("click", function (event) {
                    if (event.target === modal) {
                        modal.classList.add("hidden");
                    }
                });
            }
        });
    </script>
</body>
</html>

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, staging ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Build and Test Job
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'public/package-lock.json'
        
    - name: Install dependencies
      run: |
        cd public
        npm install --production=false
        
    - name: Validate HTML/CSS/JS
      run: |
        cd public
        echo "🔍 Validating HTML files..."
        find . -name "*.html" -exec echo "✅ {}" \;
        
        echo "🔍 Validating CSS files..."
        find . -name "*.css" -exec echo "✅ {}" \;
        
        echo "🔍 Validating JS files..."
        find . -name "*.js" -exec echo "✅ {}" \;
        
    - name: Check file sizes
      run: |
        cd public
        echo "📊 Checking file sizes..."
        find . -name "*.html" -o -name "*.css" -o -name "*.js" | while read file; do
          size=$(stat -c%s "$file")
          echo "📁 $file: $size bytes"
        done
        
    - name: Security audit
      run: |
        cd public
        npm audit --audit-level=high || echo "⚠️ Security audit completed with warnings"

  # Deploy to Firebase Hosting
  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/staging'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install Firebase CLI
      run: npm install -g firebase-tools@latest
      
    - name: Deploy to Firebase Hosting
      run: |
        # Determine which environment to deploy to based on branch
        if [[ $GITHUB_REF == 'refs/heads/main' ]]; then
          echo "🚀 Deploying to PRODUCTION"
          firebase deploy --project no-waste-tracker --only hosting --message "Deploy from $GITHUB_REF by $GITHUB_ACTOR"
        elif [[ $GITHUB_REF == 'refs/heads/develop' ]]; then
          echo "🚀 Deploying to DEVELOPMENT"
          firebase deploy --project no-waste-tracker-dev --only hosting --message "Deploy from $GITHUB_REF by $GITHUB_ACTOR"
        elif [[ $GITHUB_REF == 'refs/heads/staging' ]]; then
          echo "🚀 Deploying to STAGING"
          firebase deploy --project no-waste-tracker-staging --only hosting --message "Deploy from $GITHUB_REF by $GITHUB_ACTOR"
        fi
      env:
        FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        
    - name: Get deployment URL
      run: |
        if [[ $GITHUB_REF == 'refs/heads/main' ]]; then
          echo "🌐 Production URL: https://no-waste-tracker.web.app"
          echo "::notice::Production deployed: https://no-waste-tracker.web.app"
        elif [[ $GITHUB_REF == 'refs/heads/develop' ]]; then
          echo "🌐 Development URL: https://no-waste-tracker-dev.web.app"
          echo "::notice::Development deployed: https://no-waste-tracker-dev.web.app"
        elif [[ $GITHUB_REF == 'refs/heads/staging' ]]; then
          echo "🌐 Staging URL: https://no-waste-tracker-staging.web.app"
          echo "::notice::Staging deployed: https://no-waste-tracker-staging.web.app"
        fi

  # Preview Deploy for Pull Requests
  preview-deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install Firebase CLI
      run: npm install -g firebase-tools@latest
      
    - name: Deploy to Preview Channel
      run: |
        # Create preview channel for PR
        PR_NUMBER=${{ github.event.pull_request.number }}
        BRANCH_NAME=${{ github.head_ref }}
        
        echo "🚀 Deploying preview for PR #$PR_NUMBER from $BRANCH_NAME"
        
        firebase hosting:channel:deploy \
          "pr-$PR_NUMBER" \
          --project no-waste-tracker \
          --expires 7d \
          --message "Preview for PR #$PR_NUMBER from $BRANCH_NAME by $GITHUB_ACTOR"
      env:
        FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        
    - name: Comment PR with Preview URL
      uses: actions/github-script@v7
      with:
        script: |
          const prNumber = context.issue.number;
          const branchName = context.payload.pull_request.head.ref;
          
          const comment = `## 🚀 Preview Deploy Ready!
          
          **Pull Request:** #${prNumber}
          **Branch:** ${branchName}
          
          **Preview URL:** https://no-waste-tracker--pr-${prNumber}.web.app
          
          ⏰ This preview will expire in 7 days.
          
          ---
          
          🤖 *Deployed automatically via GitHub Actions*`;
          
          github.rest.issues.createComment({
            issue_number: prNumber,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

  # Lighthouse Performance Audit
  lighthouse:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Lighthouse CI
      uses: treosh/lighthouse-ci-action@v10
      with:
        urls: |
          https://no-waste-tracker.web.app
          https://no-waste-tracker.web.app/dashboard.html
          https://no-waste-tracker.web.app/add-product.html
        uploadArtifacts: true
        temporaryPublicStorage: true
        
    - name: Upload Lighthouse results
      uses: actions/upload-artifact@v4
      with:
        name: lighthouse-results
        path: '.lighthouseci'
